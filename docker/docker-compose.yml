name: vault-history-history

services:
    app:
        build:
            context: ..
            dockerfile: docker/Dockerfile
            target: local
        image: vault-history-history-api:local
        container_name: vault-history-api
        restart: unless-stopped
        depends_on:
            mongodb:
                condition: service_healthy
        ports:
            - '3000:3000'
        env_file:
            - ../config/.env.local
        environment:
            NODE_ENV: local
            MONGO_URI: mongodb://vault_history:vault_history_password@mongodb:27017/vault_history_local?authSource=admin
        volumes:
            - ../:/app
            - app_node_modules:/app/node_modules

    mongodb:
        image: mongo:7
        container_name: vault-history-mongodb
        restart: unless-stopped
        ports:
            - '27017:27017'
        environment:
            MONGO_INITDB_ROOT_USERNAME: vault_history
            MONGO_INITDB_ROOT_PASSWORD: vault_history_password
            MONGO_INITDB_DATABASE: vault_history_local
        volumes:
            - mongodb_data:/data/db
        healthcheck:
            test:
                [
                    'CMD',
                    'mongosh',
                    '--quiet',
                    '--eval',
                    "db.adminCommand('ping').ok",
                    '-u',
                    'vault_history',
                    '-p',
                    'vault_history_password',
                    '--authenticationDatabase',
                    'admin',
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 15s

    mongo-express:
        image: mongo-express:1.0.2
        container_name: vault-history-mongo-express
        restart: unless-stopped
        depends_on:
            mongodb:
                condition: service_healthy
        ports:
            - '8081:8081'
        environment:
            ME_CONFIG_MONGODB_ADMINUSERNAME: vault_history
            ME_CONFIG_MONGODB_ADMINPASSWORD: vault_history_password
            ME_CONFIG_MONGODB_SERVER: mongodb
            ME_CONFIG_BASICAUTH_USERNAME: admin
            ME_CONFIG_BASICAUTH_PASSWORD: admin

volumes:
    app_node_modules:
    mongodb_data:
